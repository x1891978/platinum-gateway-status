status-website:
  cname: up.kjhbm.com
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: 网关状态监控
  introTitle: "系统的呼吸与心跳"
  introMessage: 这是我们大模型分发网关的实时监控面板。如果这里全绿但你无法使用，请检查你的网络或客户端设置。

sites:
  # 探针 1：监控 Caddy 和 Bridge 是否活在物理层 (0 成本)
  - name: 🟢 核心网关心跳 (Bridge)
    url: https://api.kjhbm.com/healthz
    expectedStatusCodes:
      - 200

  # 探针 2：监控 New-API 鉴权中枢与 DB 数据库是否存活 (极低成本验证)
  - name: 🔵 计费与路由中枢 (New-API)
    url: https://api.kjhbm.com/v1/models
    method: GET
    headers:
      - "Authorization: Bearer $MONITOR_TOKEN"
    expectedStatusCodes:
      - 200

