owner: x1891978
repo: platinum-gateway-status

user-agent: Platinum-Gateway-Monitor/1.0
status-website:
  cname: up.kjhbm.com
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: 网关状态监控
  introTitle: "系统的呼吸与心跳"
  introMessage: 这是我们大模型分发网关的实时监控面板。如果这里全绿但你无法使用，请检查你的网络或客户端设置。

sites:
  # 探针 1：监控 Caddy 和 Bridge 是否活在物理层 (0 成本)
  - name: 🟢 核心网关心跳 (Bridge)
    url: https://api.kjhbm.com/healthz
    expectedStatusCodes:
      - 200

  # 探针 2：监控 New-API 鉴权中枢与 DB 数据库是否存活 (极低成本验证)
  - name: 🔵 计费与路由中枢 (New-API)
    url: https://api.kjhbm.com/v1/models
    method: GET
    headers:
      - "Authorization: Bearer $MONITOR_TOKEN"
    expectedStatusCodes:
      - 200
      
  # 探针 3：全链路测活 - 基础文本 (消耗极低)
  - name: ⚡ 文本引擎 (Gemini 2.5 Flash)
    url: https://api.kjhbm.com/v1/chat/completions
    method: POST
    headers:
      - "Authorization: Bearer $MONITOR_TOKEN"
      - "Content-Type: application/json"
    body: '{"model": "gemini-2.5-flash", "messages": [{"role": "user", "content": "hi"}], "max_tokens": 5, "stream": false}'
    expectedStatusCodes:
      - 200

  # 探针 4：全链路测活 - 旗舰画图 (由于网关做了异步URL秒回，这里必能测通且不会超时)
  - name: 🎨 画图引擎 (Nano Banana)
    url: https://api.kjhbm.com/v1/chat/completions
    method: POST
    headers:
      - "Authorization: Bearer $MONITOR_TOKEN"
      - "Content-Type: application/json"
    body: '{"model": "gemini-2.5-flash-image", "messages": [{"role": "user", "content": "draw a dot"}], "size": "1024x1024", "stream": false}'
    expectedStatusCodes:
      - 200

assignees:
  - x1891978
